<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Token Optimizer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <h1>Token Optimizer</h1>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="skeletonizer" role="tab" aria-selected="true">Skeletonizer</button>
    <button class="tab-btn" data-tab="projects" role="tab" aria-selected="false">Projects</button>
  </nav>

  <!-- ===================== TAB 1: SKELETONIZER (Module 1) ===================== -->
  <section id="tab-skeletonizer" class="tab-panel active">
    <div class="glass-card">
      <div class="field">
        <label for="repo-input">GitHub repo</label>
        <input id="repo-input" type="text" placeholder="owner/repo or github.com/owner/repo" />
      </div>

      <details class="field field-collapsible">
        <summary>GitHub token <span class="summary-hint">optional — raises rate limit to 5,000/hr</span></summary>
        <input id="token-input" type="password" placeholder="ghp_..." />
        <p class="hint">Stored locally via chrome.storage, never sent anywhere but api.github.com.</p>
      </details>

      <button id="build-btn" class="btn-primary">
        <span>Build Tier 1 Pack</span>
      </button>

      <div id="status" class="status" hidden></div>

      <div id="result" class="result" hidden>
        <div class="result-header">
          <span id="token-count" class="token-count-value"></span>
          <span id="trimmed-note" class="trimmed-note"></span>
        </div>
        <div class="compression-meter" aria-hidden="true">
          <div class="compression-meter-fill"></div>
        </div>

        <div id="entry-file-note" class="entry-note"></div>

        <textarea id="output" readonly></textarea>

        <button id="copy-btn" class="btn-ghost">Copy to Clipboard</button>
      </div>
    </div>
  </section>

  <!-- ===================== TAB 2: PROJECTS (Module 2) — pure GitHub tracker ===================== -->
  <section id="tab-projects" class="tab-panel">
    <div id="project-list"></div>

    <details class="field field-collapsible" id="new-project-form">
      <summary>+ Track a new project</summary>
      <input id="new-project-name" type="text" placeholder="Project name (e.g. AML Motors)" />
      <input id="new-project-repo" type="text" placeholder="owner/repo" />
      <button id="new-project-btn" class="btn-primary">Add Project</button>
    </details>

    <div id="project-detail" class="project-detail glass-card" hidden>
      <div class="pd-header-row">
        <div>
          <h2 id="pd-name"></h2>
          <p id="pd-repo" class="hint mono"></p>
        </div>
        <button id="pd-pin-btn" class="pin-btn" title="Pin to top (max 4)">☆ Pin</button>
      </div>

      <div class="pd-status-row">
        <span id="pd-last-checked" class="fact-line"></span>
        <span id="pd-last-commit" class="fact-line"></span>
      </div>

      <button id="pd-refresh-btn" class="btn-primary">Check for Updates</button>
      <div id="pd-status" class="status" hidden></div>

      <div id="pd-history" class="history-box"></div>
    </div>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
